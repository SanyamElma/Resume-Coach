name: resume-analyzer

services:
  db:
    image: postgres:16-alpine
    container_name: ra-db
    environment:
      POSTGRES_DB: ${DB_NAME:-resume_analyzer}
      POSTGRES_USER: ${DB_USERNAME:-resume_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resume_pass}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-resume_user} -d ${DB_NAME:-resume_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ra-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-resume_analyzer}
      DB_USERNAME: ${DB_USERNAME:-resume_user}
      DB_PASSWORD: ${DB_PASSWORD:-resume_pass}
      JWT_SECRET: ${JWT_SECRET:-Y2hhbmdlLXRoaXMtc2VjcmV0LWluLXByb2R1Y3Rpb24tcGxlYXNlLW5vdy0xMjM0NQ==}
      # AI provider: mock (default, offline) | openai | gemini
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STORAGE_LOCAL_PATH: /app/storage/resumes
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@resume-analyzer.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
    ports:
      - "8080:8080"
    volumes:
      - resume-storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: ra-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  db-data:
  resume-storage:
