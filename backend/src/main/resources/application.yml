spring:
  application:
    name: resume-analyzer-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    # DB_URL wins if set; otherwise compose from discrete parts (how managed hosts like
    # Render inject connection details: DB_HOST / DB_PORT / DB_NAME).
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resume_analyzer}}
    username: ${DB_USERNAME:resume_user}
    password: ${DB_PASSWORD:resume_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: ResumeAnalyzerHikari

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  # Honor the platform-injected PORT (Render/Heroku), then SERVER_PORT, then default 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# ---------------------------------------------------------------------------
# Application-specific configuration (bound to AppProperties)
# ---------------------------------------------------------------------------
app:
  security:
    jwt:
      # 256-bit Base64 secret. OVERRIDE IN PRODUCTION via JWT_SECRET env var.
      secret: ${JWT_SECRET:Y2hhbmdlLXRoaXMtc2VjcmV0LWluLXByb2R1Y3Rpb24tcGxlYXNlLW5vdy0xMjM0NQ==}
      access-token-ttl: ${JWT_ACCESS_TTL:PT15M}      # 15 minutes
      refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}      # 7 days
      issuer: resume-analyzer
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  storage:
    # Pluggable storage. 'local' for dev, designed to swap to 's3' later.
    provider: ${STORAGE_PROVIDER:local}
    local:
      base-path: ${STORAGE_LOCAL_PATH:./storage/resumes}
    max-file-size-bytes: 10485760   # 10 MB

  ai:
    # Active provider: mock | openai | gemini  (Strategy pattern selector)
    provider: ${AI_PROVIDER:mock}
    request-timeout: ${AI_TIMEOUT:PT60S}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-4o-mini}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      model: ${GEMINI_MODEL:gemini-1.5-flash}

    # RAG / AI engine (embeddings + vector store + retrieval)
    engine:
      embedding-provider: ${EMBEDDING_PROVIDER:mock}   # mock | openai | gemini
      embedding-dimensions: ${EMBEDDING_DIMENSIONS:768}
      vector-store: ${VECTOR_STORE:pgvector}            # pgvector | memory
      retrieval:
        top-k: ${RAG_TOP_K:5}
        similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.25}

    # AI response cache (in-process LRU + TTL by default; swap for Redis bean to scale out)
    cache:
      ttl-seconds: ${AI_CACHE_TTL_SECONDS:3600}
      max-entries: ${AI_CACHE_MAX_ENTRIES:1000}

    # Per-model pricing for cost tracking (USD per 1K tokens). Built-in defaults exist for common
    # models; override or extend here. The mock provider is always free.
    pricing:
      models:
        gpt-4o-mini:
          input-per1k: 0.00015
          output-per1k: 0.0006
          embedding-per1k: 0
        text-embedding-3-small:
          input-per1k: 0
          output-per1k: 0
          embedding-per1k: 0.00002

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.resumeanalyzer: DEBUG
    org.springframework.security: INFO
