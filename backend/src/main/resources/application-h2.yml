# ===========================================================================
# 'h2' profile: run the backend with ZERO external dependencies.
# No PostgreSQL, no Docker — uses a file-based H2 database (data persists in
# ./data/resume-analyzer.mv.db). Schema is generated by Hibernate; Flyway off.
# Start with: SPRING_PROFILES_ACTIVE=h2 java -jar target/resume-analyzer-api.jar
# Intended for local development/demos only — use PostgreSQL for production.
# ===========================================================================
spring:
  datasource:
    url: jdbc:h2:file:./data/resume-analyzer;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

app:
  ai:
    provider: ${AI_PROVIDER:mock}
