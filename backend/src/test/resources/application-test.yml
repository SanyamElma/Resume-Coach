# Test profile: in-memory H2 (PostgreSQL compatibility mode), schema from JPA, Flyway off.
spring:
  datasource:
    url: jdbc:h2:mem:ra;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  ai:
    provider: mock
    engine:
      vector-store: memory
      embedding-provider: mock
